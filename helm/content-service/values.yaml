replicaCount: 1

image:
  repository: ghcr.io/passtheo/passtheo-content-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8087

resources:
  limits:
    cpu: 250m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

env:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgresql:5432/content_db
  SPRING_DATASOURCE_USERNAME: content_service_app
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DATABASE: "3"
  STRAPI_BASE_URL: http://strapi:1337
  SUBSCRIPTION_SERVICE_URL: http://subscription-service:8083
  SERVER_PORT: "8087"

secrets:
  SPRING_DATASOURCE_PASSWORD: password
  STRAPI_API_TOKEN: strapi-api-token

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8087
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8087
  initialDelaySeconds: 20
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
