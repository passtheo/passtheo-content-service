        freeDailyQuestionLimit: { type: integer }
        freeWeeklyExamLimit: { type: integer }
        freeDomainLimit: { type: integer }
        supportEmail: { type: string }

    # ─── Entity DTOs ───
    CountryDto:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        flagImage: { type: string }
        supportedLocales: { type: array, items: { type: string } }

    ProductTypeDto:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        description: { type: string }
        icon: { type: string }
        productCount: { type: integer }

    ProductDto:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        licenceCode: { type: string }
        description: { type: string }
        icon: { type: string }
        examConfig:
          type: object
          properties:
            totalQuestions: { type: integer }
            timeLimitMinutes: { type: integer }
            passScore: { type: integer }
        domainCount: { type: integer }
        totalQuestions: { type: integer }

    DomainWithProgressDto:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        icon: { type: string }
        color: { type: string }
        topicCount: { type: integer }
        questionCount: { type: integer }
        isFreePreview: { type: boolean }
        isLocked: { type: boolean }
        progress:
          type: object
          nullable: true
          properties:
            coveragePercent: { type: number }
            accuracyPercent: { type: number }
            masteredCount: { type: integer }
            strength: { type: string, enum: [UNKNOWN, WEAK, MODERATE, STRONG, MASTERED] }

    TopicWithProgressDto:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        difficulty: { type: string }
        questionCount: { type: integer }
        progress:
          type: object
          nullable: true
          properties:
            coveragePercent: { type: number }
            accuracyPercent: { type: number }
            masteredCount: { type: integer }

    RoadSignDto:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        signCategory: { type: string }
        description: { type: string }
        imageUrl: { type: string }
        shape: { type: string }

    LessonDto:
      type: object
      properties:
        title: { type: string }
        slug: { type: string }
        sections:
          type: array
          items:
            type: object
            properties:
              heading: { type: string, nullable: true }
              body: { type: string, nullable: true }
              tip: { type: string, nullable: true }
              keyRule: { type: string, nullable: true }
              relatedRoadSignCode: { type: string, nullable: true }
              sortOrder: { type: integer }
        summary: { type: string }
        coverImage: { type: string }
        videoUrl: { type: string }
        readTimeMinutes: { type: integer }

    SessionDto:
      type: object
      properties:
        sessionId: { type: string, format: uuid }
        status: { type: string, enum: [IN_PROGRESS, COMPLETED, ABANDONED] }
        totalQuestions: { type: integer }
        answeredCount: { type: integer }
        correctCount: { type: integer }
        currentQuestion:
          $ref: '#/components/schemas/QuestionDto'

    QuestionDto:
      type: object
      properties:
        strapiQuestionId: { type: string }
        questionText: { type: string }
        interactionType: { type: string, enum: [multiple_choice, yes_no, fill_in_number, tap_on_image, drag_checkmark, drag_numbers] }
        imageUrl: { type: string, nullable: true }
        videoUrl: { type: string, nullable: true }
        answerOptions:
          type: array
          nullable: true
          items:
            type: object
            properties:
              id: { type: string }
              text: { type: string }
              imageUrl: { type: string, nullable: true }
        imageRegions:
          type: array
          nullable: true
          items:
            type: object
            properties:
              id: { type: string }
              xPercent: { type: number }
              yPercent: { type: number }
              widthPercent: { type: number }
              heightPercent: { type: number }
        dragTargets:
          type: array
          nullable: true
          items:
            type: object
            properties:
              id: { type: string }
              label: { type: string }
              imageUrl: { type: string, nullable: true }
