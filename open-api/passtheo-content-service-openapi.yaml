openapi: 3.1.0
info:
  title: PassTheo Content Service
  description: |
    The core learning engine for PassTheo. Serves questions, tracks progress,
    runs mock exams, manages streaks, awards achievements, and generates study plans.
    
    Content hierarchy: Country → ProductType → Product → Domain → Topic → Question
    Language is Strapi i18n, orthogonal to hierarchy.
  version: 1.0.0

servers:
  - url: http://localhost:8087
    description: Local development

tags:
  - name: Content
    description: Browse content hierarchy (from Strapi, cached in Redis)
  - name: Practice
    description: Practice sessions — start, answer questions, complete
  - name: Exams
    description: Mock exam simulation (50q, 30min, pass 44 for CBR)
  - name: Progress
    description: Readiness score, domain/topic progress, mastery stats
  - name: Streaks
    description: Daily study streaks and freeze slots
  - name: Achievements
    description: Earned badges and achievement gallery
  - name: StudyPlan
    description: Generated study schedule based on weak domains + exam date
  - name: Internal
    description: Service-to-service endpoints

paths:
  # ─── CONTENT HIERARCHY ───
  /api/content/onboarding-catalog:
    get:
      operationId: getOnboardingCatalog
      tags: [Content]
      summary: Get full content catalog for onboarding
      description: |
        Returns the complete nested tree of countries, product types,
        and products in one response. Used by Flutter during onboarding
        to avoid 3 sequential API calls. Also includes app config
        for maintenance mode and version checks.
        
        Public endpoint — no authentication required.
        Cached in Redis under key "strapi:onboarding-catalog" for 1 hour.
      security: []
      responses:
        '200':
          description: Full onboarding catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_OnboardingCatalog'
              example:
                success: true
                data:
                  countries:
                    - code: "NL"
                      name: "Nederland"
                      flagImage: "https://cdn.passtheo.nl/flags/nl.svg"
                      supportedLocales: ["nl", "en", "ar", "tr", "pl"]
                      productTypes:
                        - code: "cbr"
                          name: "CBR Rijexamen"
                          description: "Theorie-examen voor het rijbewijs"
                          icon: "https://cdn.passtheo.nl/icons/cbr.svg"
                          regulatoryBody: "Centraal Bureau Rijvaardigheidsbewijzen"
                          products:
                            - code: "auto-b"
                              name: "Auto Theorie (B)"
                              licenceCode: "B"
                              description: "Theorie-examen personenauto rijbewijs B"
                              icon: "https://cdn.passtheo.nl/icons/auto-b.svg"
                              isPremium: false
                              examConfig:
                                totalQuestions: 50
                                timeLimitMinutes: 30
                                passScore: 44
                              domainCount: 6
                              totalQuestions: 487
                  appConfig:
                    maintenanceMode: false
                    minimumAppVersion: "1.0.0"
                    freeDailyQuestionLimit: 10
                    freeWeeklyExamLimit: 0
                    freeDomainLimit: 2
                    supportEmail: "support@passtheo.nl"
                  supportedLocales: ["nl", "en", "ar", "tr", "pl"]
                timestamp: "2026-03-25T10:00:00Z"

  /api/content/countries:
    get:
      operationId: listCountries
      tags: [Content]
      summary: List available countries
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Available countries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_CountryList'
              example:
                success: true
                data:
                  - code: "NL"
                    name: "Nederland"
                    flagImage: "https://cdn.passtheo.nl/flags/nl.svg"
                    supportedLocales: ["nl", "en", "ar", "tr", "pl"]
                timestamp: "2026-03-19T10:00:00Z"

  /api/content/{countryCode}/product-types:
    get:
      operationId: listProductTypes
      tags: [Content]
      summary: List product types for a country (CBR, VCA, etc.)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CountryCode'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Product types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ProductTypeList'
              example:
                success: true
                data:
                  - code: "cbr"
                    name: "CBR Rijexamen"
                    description: "Dutch driving theory exams"
                    icon: "https://cdn.passtheo.nl/icons/cbr.svg"
                    productCount: 3
                timestamp: "2026-03-19T10:00:00Z"

  /api/content/{countryCode}/{productTypeCode}/products:
    get:
      operationId: listProducts
      tags: [Content]
      summary: List products within a product type (Auto B, Motor A, etc.)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CountryCode'
        - $ref: '#/components/parameters/ProductTypeCode'
        - $ref: '#/components/parameters/TenantHeader'
      responses:
        '200':
          description: Products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ProductList'
              example:
                success: true
                data:
                  - code: "auto-b"
                    name: "Auto Theorie (B)"
                    licenceCode: "B"
                    description: "Car driving theory exam"
                    icon: "https://cdn.passtheo.nl/icons/auto-b.svg"
                    examConfig:
                      totalQuestions: 50
                      timeLimitMinutes: 30
                      passScore: 44
                    domainCount: 6
                    totalQuestions: 487
                timestamp: "2026-03-19T10:00:00Z"

  /api/content/{countryCode}/{productTypeCode}/{productCode}/domains:
    get:
      operationId: listDomains
      tags: [Content]
      summary: List domains for a product with user progress
      description: |
        Returns all domains with the current user's progress overlay
        (coverage %, accuracy %, strength label, locked/unlocked status).
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CountryCode'
        - $ref: '#/components/parameters/ProductTypeCode'
        - $ref: '#/components/parameters/ProductCode'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
        - $ref: '#/components/parameters/LocaleQuery'
      responses:
        '200':
          description: Domains with progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_DomainList'
              example:
                success: true
                data:
                  - code: "verkeersborden"
                    name: "Verkeersborden en verkeerstekens"
                    icon: "https://cdn.passtheo.nl/icons/verkeersborden.svg"
                    color: "#3B82F6"
                    topicCount: 7
                    questionCount: 85
                    isFreePreview: true
                    isLocked: false
                    progress:
                      coveragePercent: 72.0
                      accuracyPercent: 81.5
                      masteredCount: 42
                      strength: "STRONG"
                  - code: "voorrang"
                    name: "Voorrang en kruisingen"
                    icon: "https://cdn.passtheo.nl/icons/voorrang.svg"
                    color: "#EF4444"
                    topicCount: 6
                    questionCount: 78
                    isFreePreview: true
                    isLocked: false
                    progress:
                      coveragePercent: 45.0
                      accuracyPercent: 58.3
                      masteredCount: 12
                      strength: "WEAK"
                timestamp: "2026-03-19T10:00:00Z"

  /api/content/{countryCode}/{productTypeCode}/{productCode}/domains/{domainCode}/topics:
    get:
      operationId: listTopics
      tags: [Content]
      summary: List topics within a domain with user progress
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CountryCode'
        - $ref: '#/components/parameters/ProductTypeCode'
        - $ref: '#/components/parameters/ProductCode'
        - $ref: '#/components/parameters/DomainCode'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
        - $ref: '#/components/parameters/LocaleQuery'
      responses:
        '200':
          description: Topics with progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_TopicList'

  /api/content/{countryCode}/{productTypeCode}/{productCode}/road-signs:
    get:
      operationId: listRoadSigns
      tags: [Content]
      summary: Road sign reference library
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CountryCode'
        - $ref: '#/components/parameters/ProductTypeCode'
        - $ref: '#/components/parameters/ProductCode'
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/LocaleQuery'
        - name: category
          in: query
          schema:
            type: string
            enum: [warning, prohibition, mandatory, information, priority, direction]
      responses:
        '200':
          description: Road signs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_RoadSignList'

  /api/content/{countryCode}/{productTypeCode}/{productCode}/lessons/{topicCode}:
    get:
      operationId: listLessons
      tags: [Content]
      summary: Theory lessons for a topic
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CountryCode'
        - $ref: '#/components/parameters/ProductTypeCode'
        - $ref: '#/components/parameters/ProductCode'
        - name: topicCode
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/LocaleQuery'
      responses:
        '200':
          description: Lessons
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_LessonList'

  # ─── PRACTICE SESSIONS ───
  /api/practice/sessions/active:
    get:
      operationId: getActiveSession
      tags: [Practice]
      summary: Get most recent in-progress session for dashboard
      description: |
        Returns the user's most recently active IN_PROGRESS practice session,
        or null if no active session exists. Used by the Flutter dashboard
        "Continue Practicing" card.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
        - name: productCode
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/LocaleQuery'
      responses:
        '200':
          description: Active session or null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ActiveSession'
              examples:
                activeSession:
                  summary: User has an in-progress session
                  value:
                    success: true
                    data:
                      sessionId: "770e8400-e29b-41d4-a716-446655440001"
                      domainCode: "voorrang"
                      domainName: "Voorrang"
                      sessionType: "PRACTICE"
                      totalQuestions: 20
                      answeredQuestions: 7
                      progressPercent: 35
                      createdAt: "2026-03-25T14:30:00Z"
                    timestamp: "2026-03-29T10:00:00Z"
                noSession:
                  summary: No active session
                  value:
                    success: true
                    data: null
                    timestamp: "2026-03-29T10:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/practice/sessions:
    post:
      operationId: startSession
      tags: [Practice]
      summary: Start a practice session
      description: |
        Creates a new practice session and selects questions using the
        spaced repetition algorithm. Returns the session with the first question.
        
        Checks entitlement via shared Redis access cache:
        - Free users: domain must be isFreePreview, daily limit checked via subscription-service
        - Paid users: all domains, unlimited
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
            example:
              productCode: "auto-b"
              domainCode: "verkeersborden"
              topicCode: null
              sessionType: "PRACTICE"
              questionCount: 10
              locale: "tr"
      responses:
        '200':
          description: Session started with first question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Session'
              example:
                success: true
                data:
                  sessionId: "770e8400-e29b-41d4-a716-446655440001"
                  status: "IN_PROGRESS"
                  totalQuestions: 10
                  answeredCount: 0
                  currentQuestion:
                    strapiQuestionId: "q-001"
                    questionText: "Wat betekent dit verkeersbord?"
                    interactionType: "multiple_choice"
                    imageUrl: "https://cdn.passtheo.nl/questions/q001.png"
                    answerOptions:
                      - id: "a1"
                        text: "Voorrang verlenen"
                      - id: "a2"
                        text: "Stopverbod"
                      - id: "a3"
                        text: "Eenrichtingsverkeer"
                    questionOrder: 1
                timestamp: "2026-03-19T10:00:00Z"
        '403':
          description: Domain locked (free user, not free preview)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '429':
          description: Daily question limit reached (free user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/practice/sessions/{sessionId}/answer:
    post:
      operationId: submitAnswer
      tags: [Practice]
      summary: Submit an answer for the current question
      description: |
        Records the answer, updates spaced repetition state, checks streak,
        checks achievements (async), and returns feedback + next question.
        
        For free users, increments usage counter via subscription-service.
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
            example:
              strapiQuestionId: "q-001"
              answer:
                selectedOptionId: "a1"
              timeTakenMs: 8500
      responses:
        '200':
          description: Answer result with feedback + next question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AnswerResult'
              example:
                success: true
                data:
                  isCorrect: true
                  correctAnswer:
                    selectedOptionId: "a1"
                  explanation:
                    text: "Dit bord betekent dat je voorrang moet verlenen."
                    tip: "Driehoek op punt = voorrang verlenen"
                  masteryUpdate:
                    previousLevel: "LEARNING"
                    newLevel: "FAMILIAR"
                    consecutiveCorrect: 3
                  sessionProgress:
                    answeredCount: 1
                    correctCount: 1
                    totalQuestions: 10
                    accuracyPercent: 100.0
                  nextQuestion:
                    strapiQuestionId: "q-002"
                    questionText: "Mag u hier parkeren?"
                    interactionType: "yes_no"
                    imageUrl: "https://cdn.passtheo.nl/questions/q002.png"
                    questionOrder: 2
                  newAchievements: []
                timestamp: "2026-03-19T10:00:05Z"

  /api/practice/sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [Practice]
      summary: Get current session state (for resuming after app close)
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
      responses:
        '200':
          description: Session with current question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Session'

  /api/practice/sessions/{sessionId}/complete:
    post:
      operationId: completeSession
      tags: [Practice]
      summary: Mark session as completed
      security:
        - bearerAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
      responses:
        '200':
          description: Session summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_SessionSummary'
              example:
                success: true
                data:
                  sessionId: "770e8400-e29b-41d4-a716-446655440001"
                  status: "COMPLETED"
                  totalQuestions: 10
                  correctCount: 8
                  accuracyPercent: 80.0
                  timeSpentSeconds: 245
                  masteryChanges:
                    upgraded: 3
                    downgraded: 1
                    unchanged: 6
                  streakUpdate:
                    currentStreak: 5
                    isNewDay: true
                  newAchievements:
                    - code: "questions_50"
                      name: "Studious"
                      icon: "https://cdn.passtheo.nl/achievements/studious.png"
                timestamp: "2026-03-19T10:04:05Z"

  # ─── MOCK EXAMS ───
  /api/exams/mock/start:
    post:
      operationId: startMockExam
      tags: [Exams]
      summary: Start a full mock exam
      description: |
        Generates a complete mock exam with questions distributed across
        all domains according to the ExamConfig. No feedback during exam.
        Timer starts immediately.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartExamRequest'
            example:
              productCode: "auto-b"
              locale: "en"
      responses:
        '200':
          description: Exam started with all questions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Exam'
              example:
                success: true
                data:
                  examId: "880e8400-e29b-41d4-a716-446655440001"
                  totalQuestions: 50
                  timeLimitSeconds: 1800
                  passScore: 44
                  startedAt: "2026-03-19T10:00:00Z"
                  expiresAt: "2026-03-19T10:30:00Z"
                  questions:
                    - strapiQuestionId: "q-101"
                      questionText: "What does this sign mean?"
                      interactionType: "multiple_choice"
                      imageUrl: "https://cdn.passtheo.nl/questions/q101.png"
                      answerOptions:
                        - id: "a1"
                          text: "Give way"
                        - id: "a2"
                          text: "No entry"
                        - id: "a3"
                          text: "One way"
                      questionOrder: 1
                      domainCode: "verkeersborden"
                timestamp: "2026-03-19T10:00:00Z"
        '403':
          description: Premium required — free users cannot take mock exams
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: "https://api.passtheo.nl/errors/premium-required"
                title: "Premium required"
                status: 403
                detail: "Upgrade to Pro to take mock exams."

  /api/exams/mock/{examId}/submit:
    post:
      operationId: submitMockExam
      tags: [Exams]
      summary: Submit all exam answers at once
      description: |
        Submits all answers, calculates score, determines pass/fail,
        updates progress, publishes exam.completed event.
      security:
        - bearerAuth: []
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitExamRequest'
      responses:
        '200':
          description: Exam result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ExamResult'
              example:
                success: true
                data:
                  examId: "880e8400-e29b-41d4-a716-446655440001"
                  passed: true
                  correctCount: 46
                  totalQuestions: 50
                  passScore: 44
                  scorePercent: 92.0
                  timeTakenSeconds: 1523
                  domainBreakdown:
                    - domainCode: "verkeersborden"
                      domainName: "Verkeersborden"
                      correct: 8
                      total: 9
                      accuracyPercent: 88.9
                    - domainCode: "voorrang"
                      domainName: "Voorrang"
                      correct: 7
                      total: 8
                      accuracyPercent: 87.5
                  wrongAnswers:
                    - strapiQuestionId: "q-115"
                      questionText: "Wat is de maximale snelheid..."
                      yourAnswer: { selectedOptionId: "a2" }
                      correctAnswer: { selectedOptionId: "a3" }
                      explanation:
                        text: "Op autosnelwegen is de maximale..."
                  readinessUpdate:
                    previousScore: 68.5
                    newScore: 76.2
                    label: "ALMOST_READY"
                  newAchievements:
                    - code: "first_exam"
                      name: "Exam ready"
                timestamp: "2026-03-19T10:25:23Z"

  /api/exams/history:
    get:
      operationId: getExamHistory
      tags: [Exams]
      summary: List past mock exam attempts
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
        - name: productCode
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Exam history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ExamHistoryList'

  # ─── PROGRESS ───
  /api/progress/readiness:
    get:
      operationId: getReadiness
      tags: [Progress]
      summary: Get readiness score with domain breakdown
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
        - name: productCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Readiness score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Readiness'
              example:
                success: true
                data:
                  readinessScore: 73.2
                  coverageScore: 68.0
                  accuracyScore: 81.5
                  examScore: 72.0
                  readinessLabel: "ALMOST_READY"
                  questionsAttempted: 340
                  totalQuestions: 500
                  bestExamScore: 46
                  examPassScore: 44
                  domainStrengths:
                    - domainCode: "verkeersborden"
                      domainName: "Verkeersborden"
                      accuracyPercent: 85.0
                      coveragePercent: 82.0
                      strength: "STRONG"
                    - domainCode: "voorrang"
                      domainName: "Voorrang"
                      accuracyPercent: 48.0
                      coveragePercent: 35.0
                      strength: "WEAK"
                timestamp: "2026-03-19T10:00:00Z"

  /api/progress/readiness/trend:
    get:
      operationId: getReadinessTrend
      tags: [Progress]
      summary: Daily readiness score trend (for chart)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
        - name: productCode
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Daily readiness snapshots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_ReadinessTrend'

  /api/progress/domains:
    get:
      operationId: getDomainProgress
      tags: [Progress]
      summary: Progress per domain
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
        - name: productCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Domain progress list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_DomainProgressList'

  /api/progress/mastery:
    get:
      operationId: getMasteryStats
      tags: [Progress]
      summary: Mastery level distribution (pie chart data)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
        - name: productCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Mastery distribution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_MasteryStats'
              example:
                success: true
                data:
                  totalQuestions: 500
                  new: 160
