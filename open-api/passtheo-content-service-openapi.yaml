    CatalogProductDto:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        licenceCode: { type: string }
        description: { type: string }
        icon: { type: string }
        isPremium: { type: boolean }
        examConfig: { $ref: '#/components/schemas/CatalogExamConfigDto' }
