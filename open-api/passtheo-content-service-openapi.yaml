        timestamp: { type: string, format: date-time }

    ApiResponse_Session:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/SessionDto' }
        timestamp: { type: string, format: date-time }

    ApiResponse_AnswerResult:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/AnswerResultDto' }
        timestamp: { type: string, format: date-time }

    ApiResponse_SessionSummary:
      type: object
