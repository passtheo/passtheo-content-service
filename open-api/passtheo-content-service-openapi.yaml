  # ─── STUDY PLAN ───
  /api/study-plan:
    post:
      operationId: generateStudyPlan
      tags: [StudyPlan]
      summary: Generate a new study plan
      description: |
        Analyzes current progress, identifies weak domains, and creates
        a daily study schedule. Weak domains get 3x more days.
        Last 3 days before exam: mixed review + daily mock exams.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateStudyPlanRequest'
            example:
              productCode: "auto-b"
              examDate: "2026-04-20"
              dailyQuestionTarget: 20
      responses:
        '200':
          description: Generated study plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_StudyPlan'

    get:
      operationId: getActiveStudyPlan
      tags: [StudyPlan]
      summary: Get current active study plan
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
        - name: productCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active study plan with today's tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_StudyPlan'
        '404':
          description: No active study plan

  /api/study-plan/today:
    get:
      operationId: getTodaysTasks
      tags: [StudyPlan]
      summary: Get today's study plan tasks
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/UserHeader'
        - name: productCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Today's tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_StudyPlanDay'
              example:
                success: true
                data:
                  dayNumber: 12
                  planDate: "2026-03-19"
                  domainCode: "voorrang"
                  domainName: "Voorrang en kruisingen"
                  questionTarget: 20
                  questionsCompleted: 7
                  includeExam: false
                  status: "IN_PROGRESS"
                  message: "Focus on Voorrang today — your weakest domain"
                timestamp: "2026-03-19T10:00:00Z"

  # ─── INTERNAL ───
  /internal/content/user/{keycloakUserId}/delete:
    delete:
      operationId: deleteUserData
      tags: [Internal]
      summary: GDPR delete all learning data for user
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - name: keycloakUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: All user learning data deleted

  /internal/cache/flush:
    post:
      operationId: flushContentCache
      tags: [Internal]
      summary: Flush Strapi content cache (admin use)
      responses:
        '200':
          description: Cache flushed

# ─── COMPONENTS ───
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
    UserHeader:
      name: X-Keycloak-User-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
    CountryCode:
      name: countryCode
      in: path
      required: true
      schema:
        type: string
      example: "NL"
    ProductTypeCode:
      name: productTypeCode
      in: path
      required: true
      schema:
        type: string
      example: "cbr"
    ProductCode:
      name: productCode
      in: path
      required: true
      schema:
        type: string
      example: "auto-b"
    DomainCode:
      name: domainCode
      in: path
      required: true
      schema:
        type: string
      example: "verkeersborden"
    LocaleQuery:
      name: locale
      in: query
      schema:
        type: string
        default: "nl"
      description: Content locale (nl, en, ar, tr, pl)

  schemas:
    # ─── Requests ───
    StartSessionRequest:
      type: object
      required: [productCode, sessionType, questionCount]
      properties:
        productCode:
          type: string
        domainCode:
          type: string
          nullable: true
          description: "null = mixed from all domains"
        topicCode:
          type: string
          nullable: true
          description: "null = all topics in domain"
        sessionType:
          type: string
          enum: [PRACTICE, QUICK_QUIZ, WEAK_REVIEW]
        questionCount:
          type: integer
          minimum: 5
          maximum: 50
          default: 10
        locale:
          type: string
          default: "nl"

    SubmitAnswerRequest:
      type: object
      required: [strapiQuestionId, answer, timeTakenMs]
      properties:
        strapiQuestionId:
          type: string
        answer:
          type: object
          description: |
            Flexible structure per interaction type:
            - multiple_choice: { "selectedOptionId": "a1" }
            - yes_no: { "answer": true }
            - fill_in_number: { "number": 50 }
            - tap_on_image: { "tappedRegionId": "r1" }
            - drag_checkmark: { "selectedTargetIds": ["t1", "t3"] }
            - drag_numbers: { "placements": { "t1": "1", "t2": "3", "t3": "2" } }
        timeTakenMs:
          type: integer

    StartExamRequest:
      type: object
      required: [productCode]
      properties:
        productCode:
          type: string
        locale:
          type: string
          default: "nl"

    SubmitExamRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            type: object
            required: [strapiQuestionId, answer]
            properties:
              strapiQuestionId:
                type: string
              answer:
                type: object
              timeTakenMs:
                type: integer

    GenerateStudyPlanRequest:
      type: object
      required: [productCode]
      properties:
        productCode:
          type: string
        examDate:
          type: string
          format: date
          nullable: true
          description: "null = 30-day default plan"
        dailyQuestionTarget:
          type: integer
          default: 20

    # ─── Responses (abbreviated — key DTOs) ───
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    ApiResponse_CountryList:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/CountryDto' } }
        timestamp: { type: string, format: date-time }

    ApiResponse_ProductTypeList:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/ProductTypeDto' } }
        timestamp: { type: string, format: date-time }

    ApiResponse_ProductList:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/ProductDto' } }
        timestamp: { type: string, format: date-time }

    ApiResponse_DomainList:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/DomainWithProgressDto' } }
        timestamp: { type: string, format: date-time }

    ApiResponse_TopicList:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/TopicWithProgressDto' } }
        timestamp: { type: string, format: date-time }

    ApiResponse_RoadSignList:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/RoadSignDto' } }
        timestamp: { type: string, format: date-time }

    ApiResponse_LessonList:
